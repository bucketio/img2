<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <rect width="700" height="350" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="700" height="350" fill="none" stroke="#dee2e6" stroke-width="1" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">全过程咨询政策演进 2019—2025</text>
  
  <!-- Timeline line -->
  <line x1="60" y1="160" x2="660" y2="160" stroke="#1a6bff" stroke-width="3"/>
  
  <!-- Dot 2019 -->
  <circle cx="110" cy="160" r="8" fill="#1a6bff"/>
  <circle cx="110" cy="160" r="12" fill="#1a6bff" opacity="0.15"/>
  <text x="110" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">2019</text>
  <rect x="40" y="175" width="140" height="45" rx="5" fill="#e8f0fe"/>
  <text x="110" y="192" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#1a6bff">515号文发布</text>
  <text x="110" y="208" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#666">鼓励探索全过程咨询</text>
  
  <!-- Dot 2021 -->
  <circle cx="225" cy="160" r="8" fill="#4a90d9"/>
  <circle cx="225" cy="160" r="12" fill="#4a90d9" opacity="0.15"/>
  <text x="225" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">2021</text>
  <rect x="170" y="95" width="110" height="45" rx="5" fill="#e8f0fe"/>
  <text x="225" y="112" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#4a90d9">住建部试点推进</text>
  <text x="225" y="128" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#666">多地启动试点项目</text>
  
  <!-- Dot 2023 -->
  <circle cx="340" cy="160" r="8" fill="#5b6abf"/>
  <circle cx="340" cy="160" r="12" fill="#5b6abf" opacity="0.15"/>
  <text x="340" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">2023</text>
  <rect x="275" y="175" width="130" height="45" rx="5" fill="#f0f4ff"/>
  <text x="340" y="192" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#5b6abf">市场规模超7,200亿</text>
  <text x="340" y="208" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#666">全过程咨询占比达11%</text>
  
  <!-- Dot 2024 -->
  <circle cx="455" cy="160" r="8" fill="#ff6b35"/>
  <circle cx="455" cy="160" r="12" fill="#ff6b35" opacity="0.15"/>
  <text x="455" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">2024</text>
  <rect x="385" y="95" width="140" height="45" rx="5" fill="#fff3e0"/>
  <text x="455" y="112" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#ff6b35">首个团体标准发布</text>
  <text x="455" y="128" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#666">T/CECS 1470-2024</text>
  
  <!-- Dot 2025 -->
  <circle cx="570" cy="160" r="10" fill="#e53935"/>
  <circle cx="570" cy="160" r="15" fill="#e53935" opacity="0.12"/>
  <text x="570" y="140" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">2025</text>
  <rect x="500" y="175" width="140" height="45" rx="5" fill="#fce4ec"/>
  <text x="570" y="192" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#e53935">各省强制推行</text>
  <text x="570" y="208" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#666">浙江、海南率先实施</text>
  
  <!-- Arrow label -->
  <text x="350" y="250" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#888">从"鼓励探索" → 制度性要求 → 部分地区强制推行</text>
  
  <!-- Data box -->
  <rect x="130" y="270" width="440" height="32" rx="6" fill="#f5f5f5"/>
  <text x="350" y="290" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">全过程咨询占比：2019年 &lt;3%  →  2025年 ≈17%  |  六年结构性转移</text>
  
  <text x="690" y="342" text-anchor="end" font-family="sans-serif" font-size="9" fill="#aaa">来源：住建部历年统计公报、智研咨询</text>
</svg>
