<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" width="940" height="400">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8f9fa"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
  </defs>
  <rect width="940" height="400" fill="url(#bg3)"/>
  
  <!-- 10 small circles forming arc in background -->
  <g opacity="0.3">
    <circle cx="710" cy="80" r="15" fill="#1a6bff"/>
    <circle cx="760" cy="110" r="15" fill="#ff6b35"/>
    <circle cx="795" cy="150" r="15" fill="#2e7d32"/>
    <circle cx="810" cy="200" r="15" fill="#5b6abf"/>
    <circle cx="800" cy="250" r="15" fill="#e53935"/>
    <circle cx="770" cy="295" r="15" fill="#1a6bff" opacity="0.7"/>
    <circle cx="720" cy="330" r="15" fill="#ff6b35" opacity="0.7"/>
    <circle cx="660" cy="350" r="15" fill="#2e7d32" opacity="0.7"/>
    <circle cx="595" cy="358" r="15" fill="#5b6abf" opacity="0.7"/>
    <circle cx="530" cy="350" r="15" fill="#e53935" opacity="0.7"/>
  </g>
  
  <!-- Connecting arc -->
  <path d="M710,80 Q850,200 530,350" fill="none" stroke="#1a6bff" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
  
  <!-- Series label -->
  <rect x="35" y="30" width="115" height="28" rx="14" fill="#1a6bff" opacity="0.85"/>
  <text x="92" y="49" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="13" font-weight="bold" fill="#fff">深度连载第2篇</text>
  
  <!-- Main title -->
  <text x="50" y="120" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="30" font-weight="bold" fill="#1e293b">一个咨询工程师80%的时间</text>
  <text x="50" y="160" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="30" font-weight="bold" fill="#1e293b">花在哪？</text>
  
  <text x="50" y="200" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" fill="#1a6bff" font-weight="bold">10个场景告诉你答案</text>
  
  <!-- Divider -->
  <line x1="50" y1="220" x2="200" y2="220" stroke="#1a6bff" stroke-width="2"/>
  
  <text x="50" y="255" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#94a3b8">项目谋划 · 政策匹配 · 专项规划 · 方案设计 · 投资测算</text>
  <text x="50" y="275" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#94a3b8">报告生成 · 招标采购 · 施工管控 · 风险预警 · 知识管理</text>
  
  <!-- Brand -->
  <text x="50" y="365" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#94a3b8">深度内容 · 每周一更新</text>
  <text x="890" y="365" text-anchor="end" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#94a3b8">清源智界研究院</text>
</svg>
