<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f1e8"/>
      <stop offset="1" stop-color="#e8f0f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#203040" flood-opacity=".18"/>
    </filter>
    <style>
      .font{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif}
      .title{font-size:58px;font-weight:800;fill:#17324d;letter-spacing:1px}
      .sub{font-size:25px;fill:#49677e}
      .node{font-size:24px;font-weight:700;fill:#17324d}
      .small{font-size:18px;fill:#6a7b88}
    </style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="90" r="130" fill="#ffb36a" opacity=".28"/>
  <circle cx="126" cy="560" r="150" fill="#7bb7d9" opacity=".22"/>
  <path d="M84 512 C228 430, 329 510, 458 425 S708 282, 835 360 1018 426, 1112 326" fill="none" stroke="#d85d4a" stroke-width="5" opacity=".55"/>
  <g filter="url(#shadow)">
    <rect x="92" y="80" width="1016" height="515" rx="28" fill="#fffdf9"/>
  </g>
  <text x="140" y="170" class="font title">许洛熙事件</text>
  <text x="140" y="232" class="font title">信任、问责与舆论压力</text>
  <text x="144" y="288" class="font sub">一场医疗公共事件里，最难谈妥的不是一笔钱，而是“怎样才算结束”。</text>
  <g transform="translate(150 365)">
    <line x1="90" y1="55" x2="300" y2="55" stroke="#9bb6c7" stroke-width="4"/>
    <line x1="420" y1="55" x2="630" y2="55" stroke="#9bb6c7" stroke-width="4"/>
    <line x1="300" y1="55" x2="420" y2="55" stroke="#d85d4a" stroke-width="4" stroke-dasharray="12 10"/>
    <g>
      <circle cx="70" cy="55" r="54" fill="#eaf4fb" stroke="#4787ad" stroke-width="3"/>
      <text x="70" y="50" text-anchor="middle" class="font node">家属</text>
      <text x="70" y="78" text-anchor="middle" class="font small">真相/责任</text>
    </g>
    <g>
      <circle cx="320" cy="55" r="54" fill="#fff1df" stroke="#d8923f" stroke-width="3"/>
      <text x="320" y="50" text-anchor="middle" class="font node">医院</text>
      <text x="320" y="78" text-anchor="middle" class="font small">边界/声誉</text>
    </g>
    <g>
      <circle cx="560" cy="55" r="54" fill="#eef8ef" stroke="#5a9b68" stroke-width="3"/>
      <text x="560" y="50" text-anchor="middle" class="font node">政府</text>
      <text x="560" y="78" text-anchor="middle" class="font small">秩序/公信</text>
    </g>
    <g>
      <rect x="710" y="0" width="178" height="110" rx="18" fill="#f4eefb" stroke="#8a6bb1" stroke-width="3"/>
      <text x="799" y="48" text-anchor="middle" class="font node">司法</text>
      <text x="799" y="77" text-anchor="middle" class="font small">证据/程序</text>
    </g>
  </g>
  <text x="144" y="560" class="font small">公开资料分析 · 非事实认定 · 2026-07-08</text>
</svg>
