  <text x="70" y="72" class="title">机制链条：纳米膜如何打通单片 3D 晶体管</text>
  <text x="70" y="112" class="sub">阅读任务：理解论文的关键实验策略为什么能绕开传统高温外延难题</text>
  
  <rect x="70" y="155" width="230" height="395" rx="14" fill="#ffffff" stroke="#d6dee8" stroke-width="1.5"/>
  <text x="105" y="210" class="label">1. 取材</text>
  <text x="105" y="255" class="small">SOI 上释放</text><text x="105" y="288" class="small">单晶硅纳米膜</text>
  <path d="M105 405 h145" stroke="#334155" stroke-width="10"/><path d="M105 374 h145" stroke="#38bdf8" stroke-width="20"/><path d="M105 350 h145" stroke="#f8fafc" stroke-width="12"/>
  <line x1="310" y1="350" x2="405" y2="350" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/><polygon points="405,350 391,357 391,343" fill="#2563eb"/>
  <rect x="420" y="155" width="230" height="395" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="455" y="210" class="label">2. 转印</text>
  <text x="455" y="255" class="small">低温搬运晶体层</text><text x="455" y="288" class="small">避免重新外延</text>
  <rect x="485" y="390" width="110" height="22" fill="#38bdf8"/><path d="M470 342 C500 310 580 310 610 342" fill="none" stroke="#2563eb" stroke-width="5"/>
  <line x1="660" y1="350" x2="755" y2="350" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/><polygon points="755,350 741,357 741,343" fill="#2563eb"/>
  <rect x="770" y="155" width="230" height="395" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="805" y="210" class="label">3. 低温制程</text>
  <text x="805" y="255" class="small">激光退火激活掺杂</text><text x="805" y="288" class="small">热预算约 385°C</text>
  <circle cx="885" cy="395" r="52" fill="#bbf7d0" stroke="#16a34a" stroke-width="5"/><path d="M855 395 h60" stroke="#16a34a" stroke-width="5"/><path d="M885 365 v60" stroke="#16a34a" stroke-width="5"/>
  <line x1="1010" y1="350" x2="1105" y2="350" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/><polygon points="1105,350 1091,357 1091,343" fill="#2563eb"/>
  <rect x="1120" y="155" width="90" height="395" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="1138" y="210" class="label">4.</text><text x="1138" y="245" class="label">堆叠</text>
  <rect x="1145" y="430" width="42" height="18" fill="#fb923c"/><rect x="1145" y="390" width="42" height="18" fill="#f97316"/><rect x="1145" y="350" width="42" height="18" fill="#ea580c"/><line x1="1166" y1="350" x2="1166" y2="448" stroke="#7c2d12" stroke-width="4"/>
  <text x="82" y="650" class="tiny">作用：纳米膜把“高质量晶体”和“后段低温加工”拆开，给单片堆叠留下工艺窗口。</text>
